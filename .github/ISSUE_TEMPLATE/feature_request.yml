name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The motivation or use case behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Alternatives you considered are welcome too.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - GUI
        - CLI
        - msr format / specification
        - Solver / search
        - Documentation
        - Other
    validations:
      required: true
