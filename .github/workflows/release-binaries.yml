name: Release binaries

# On a `v*` tag, build the native GUI + CLI binary (`morpion-solitaire`) for the
# common desktop targets and attach the bare executables to the GitHub Release
# (created if it does not exist yet), together with a `SHA256SUMS` file and SLSA
# build-provenance attestations. This is independent of `release.yml`, which
# publishes the crates to crates.io.
#
# It can also be dispatched by hand for an existing tag (e.g. to (re)build assets
# after a CI fix when the tag itself is protected and cannot be moved): run it
# from the default branch and pass the tag in the `tag` input. The jobs then
# check out that tag's source but use this (fixed) workflow definition.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build assets for, e.g. v0.1.4"
        required: true

permissions: {} # granted per job (least privilege)

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build each target and hand the bare executable to the publish job as an
  # artifact. Keeping the upload in a single downstream job gives one clean
  # SHA256SUMS and avoids the matrix racing to create the Release.
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    # On a tag push this is the tag itself; on a manual dispatch it is the input.
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, name: linux-x86_64 }
          # Cross-compiled from the Apple Silicon runner: the macOS Xcode SDK is
          # universal, so no (scarce) Intel runner is needed.
          - { os: macos-latest, target: x86_64-apple-darwin, name: macos-x86_64 }
          - { os: macos-latest, target: aarch64-apple-darwin, name: macos-aarch64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, name: windows-x86_64 }
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }} # build the tag's source, not the dispatched branch
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p morpion-solitaire --bin morpion-solitaire --target ${{ matrix.target }}

      # Bare executable, renamed after the tag and target so the assets are
      # unambiguous. No archive: each asset is a single file. (GitHub assets
      # carry no permission bit, so the Unix download needs `chmod +x` — this is
      # documented in the README.)
      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/morpion-solitaire" \
            "morpion-solitaire-${TAG}-${{ matrix.name }}"
      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/morpion-solitaire.exe" `
            "morpion-solitaire-${env:TAG}-${{ matrix.name }}.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: morpion-solitaire-${{ env.TAG }}-${{ matrix.name }}*
          if-no-files-found: error

  # Collect the binaries, generate checksums, sign (keyless SLSA provenance via
  # Sigstore) and attach everything to the Release in one shot.
  release:
    name: Sign & publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the Release and upload assets
      id-token: write # Sigstore OIDC for the build-provenance attestations
      attestations: write # record the provenance attestations
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Collect binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum morpion-solitaire-* | tee SHA256SUMS

      # Free, keyless supply-chain signing: SLSA build provenance via Sigstore.
      # Verify a download with:
      #   gh attestation verify <file> --repo ${{ github.repository }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }} # the release to create/update
          files: dist/*
