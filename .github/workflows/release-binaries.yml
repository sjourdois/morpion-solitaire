name: Release binaries

# On a `v*` tag, build the native GUI + CLI binary (`morpion-solitaire`) for the
# common desktop targets and attach them to the GitHub Release (created if it
# does not exist yet). This is independent of `release.yml`, which publishes the
# crates to crates.io.
#
# It can also be dispatched by hand for an existing tag (e.g. to (re)build assets
# after a CI fix when the tag itself is protected and cannot be moved): run it
# from the default branch and pass the tag in the `tag` input. The job then
# checks out that tag's source but uses this (fixed) workflow definition.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build assets for, e.g. v0.1.3"
        required: true

permissions:
  contents: write # create/update the GitHub Release and upload assets

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # On a tag push this is the tag itself; on a manual dispatch it is the input.
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, name: linux-x86_64 }
          # Cross-compiled from the Apple Silicon runner: the macOS Xcode SDK is
          # universal, so no (scarce) Intel runner is needed.
          - { os: macos-latest, target: x86_64-apple-darwin, name: macos-x86_64 }
          - { os: macos-latest, target: aarch64-apple-darwin, name: macos-aarch64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, name: windows-x86_64 }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }} # build the tag's source, not the dispatched branch
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p morpion-solitaire --bin morpion-solitaire --target ${{ matrix.target }}

      # Package the single binary as tar.gz (Unix) or zip (Windows), named after
      # the tag and target so release assets are unambiguous.
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="target/${{ matrix.target }}/release"
          tar -C "$dir" -czf "morpion-solitaire-${TAG}-${{ matrix.name }}.tar.gz" morpion-solitaire
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/morpion-solitaire.exe" `
            -DestinationPath "morpion-solitaire-${env:TAG}-${{ matrix.name }}.zip"

      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }} # the release to create/update (matches the asset names)
          files: morpion-solitaire-${{ env.TAG }}-${{ matrix.name }}.*
