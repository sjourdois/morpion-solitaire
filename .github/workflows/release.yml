name: Release

# Publishes the three crates to crates.io when a `v*` tag is pushed.
#
# Authentication uses crates.io **Trusted Publishing** (OIDC) — no token is
# stored in the repository. Each published crate must have a Trusted Publisher
# configured on crates.io pointing at this repo, the workflow **filename**
# `release.yml` (filename only, no directory) and the `release` environment:
#   - morpion-solitaire-record
#   - morpion-solitaire-records
#   - morpion-solitaire
#
# The `release` environment also gates the job behind a manual approval
# (Settings → Environments → release → required reviewers), so pushing a tag
# never publishes without a human click.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for the crates.io OIDC token exchange

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release # manual-approval gate
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Exchange the GitHub OIDC token for a short-lived crates.io token.
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # Publish in dependency order, but only versions not already on crates.io
      # (so a patch release that touches one crate doesn't re-publish the others).
      # Recent cargo waits for each crate to appear in the index before
      # returning, so a later crate can resolve an earlier one published here.
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          ua="morpion-solitaire release workflow (github actions)"
          for crate in morpion-solitaire-record morpion-solitaire-records morpion-solitaire; do
            ver=$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg c "$crate" '.packages[] | select(.name==$c) | .version')
            if curl -fsS -A "$ua" "https://crates.io/api/v1/crates/$crate/$ver" >/dev/null 2>&1; then
              echo "::notice::$crate $ver already on crates.io — skipping"
            else
              echo "Publishing $crate $ver"
              cargo publish -p "$crate"
            fi
          done
