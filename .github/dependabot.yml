version: 2
updates:
  # Rust dependencies (the whole Cargo workspace, from the root manifest).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One grouped PR for routine bumps instead of one per crate.
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
